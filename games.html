<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PinkGame</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --pink:  #FF2D8A;
    --glow:  #FF2D8A88;
    --dark:  #0a0a0a;
    --card:  #111111;
    --text:  #cccccc;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    font-family: 'Rajdhani', sans-serif;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(#FF2D8A09 1px, transparent 1px),
      linear-gradient(90deg, #FF2D8A09 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 55% 35% at 0% 0%, #FF2D8A10, transparent 65%),
      radial-gradient(ellipse 45% 35% at 100% 100%, #FF2D8A0c, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; gap: 20px;
    padding: 0 36px; height: 60px;
    background: #0a0a0af0;
    border-bottom: 1px solid #FF2D8A22;
    backdrop-filter: blur(12px);
  }
  .logo {
    font-family: 'Orbitron', monospace;
    font-weight: 900; font-size: 1.3rem;
    color: var(--pink); letter-spacing: 3px;
    text-shadow: 0 0 20px var(--glow);
    text-decoration: none;
  }
  .hdr-div { width: 1px; height: 26px; background: #222; flex-shrink: 0; }

  nav { display: flex; gap: 2px; }
  nav a {
    text-decoration: none; color: #555;
    font-weight: 600; font-size: 0.82rem;
    letter-spacing: 1.2px; text-transform: uppercase;
    padding: 6px 14px; border-radius: 4px;
    transition: color 0.15s, background 0.15s;
  }
  nav a:hover { color: #ccc; background: #ffffff08; }
  nav a.active { color: var(--pink); }

  .search-bar {
    display: flex; align-items: center; gap: 8px;
    margin-left: auto;
    background: #141414; border: 1px solid #222;
    border-radius: 5px; padding: 7px 14px; width: 250px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-bar:focus-within { border-color: var(--pink); box-shadow: 0 0 0 2px #FF2D8A18; }
  .search-bar svg { color: #444; flex-shrink: 0; }
  .search-bar input {
    background: none; border: none; outline: none;
    color: #ddd; font-family: 'Rajdhani', sans-serif;
    font-size: 0.9rem; font-weight: 500; width: 100%;
  }
  .search-bar input::placeholder { color: #3a3a3a; }

  /* HERO */
  .hero {
    position: relative; z-index: 5;
    padding: 52px 36px 32px;
    max-width: 1300px; margin: 0 auto;
  }
  .hero-eyebrow {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem; letter-spacing: 4px;
    color: var(--pink); text-transform: uppercase;
    margin-bottom: 12px; opacity: 0.7;
  }
  .hero h1 {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(1.8rem, 4vw, 3.5rem);
    line-height: 1.1; color: #fff;
    text-shadow: 0 0 50px #FF2D8A44;
    margin-bottom: 12px;
  }
  .hero h1 em { font-style: normal; color: var(--pink); }
  .hero p { color: #444; font-size: 0.95rem; font-weight: 500; letter-spacing: 0.5px; }

  /* CATS */
  .cats-bar {
    position: relative; z-index: 5;
    max-width: 1300px; margin: 0 auto;
    padding: 0 36px 26px;
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .cat-btn {
    background: #111; border: 1px solid #1e1e1e;
    color: #555; font-family: 'Rajdhani', sans-serif;
    font-weight: 600; font-size: 0.8rem;
    letter-spacing: 1.2px; text-transform: uppercase;
    padding: 7px 18px; border-radius: 4px;
    cursor: pointer; transition: all 0.15s;
  }
  .cat-btn:hover { border-color: var(--pink); color: var(--pink); }
  .cat-btn.active { background: var(--pink); border-color: var(--pink); color: #fff; box-shadow: 0 0 16px #FF2D8A55; }

  /* GRID */
  .grid-section {
    position: relative; z-index: 5;
    max-width: 1300px; margin: 0 auto;
    padding: 0 36px 80px;
  }
  .section-label {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem; letter-spacing: 3px;
    text-transform: uppercase; color: #2e2e2e;
    margin-bottom: 16px; padding-bottom: 10px;
    border-bottom: 1px solid #161616;
  }
  .section-label b { color: var(--pink); margin-right: 6px; }

  .game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(188px, 1fr));
    gap: 12px;
  }

  .game-card {
    background: var(--card); border: 1px solid #1a1a1a;
    border-radius: 7px; overflow: hidden;
    cursor: pointer; position: relative;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
  }
  .game-card:hover {
    border-color: var(--pink);
    transform: translateY(-4px);
    box-shadow: 0 8px 28px #FF2D8A20, 0 0 0 1px #FF2D8A18;
  }
  .thumb {
    width: 100%; aspect-ratio: 16/10;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.8rem; position: relative; overflow: hidden;
  }
  .thumb::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 20%, #11111199);
  }
  .play-overlay {
    position: absolute; inset: 0;
    background: #FF2D8A14;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s; z-index: 2;
  }
  .game-card:hover .play-overlay { opacity: 1; }
  .play-btn {
    width: 42px; height: 42px;
    background: var(--pink); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; box-shadow: 0 0 22px #FF2D8Aaa;
  }
  .info { padding: 10px 12px 12px; }
  .name {
    font-weight: 700; font-size: 0.92rem;
    color: #ccc; margin-bottom: 5px; letter-spacing: 0.2px;
  }
  .tag {
    display: inline-block;
    font-size: 0.65rem; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
    color: #383838; border: 1px solid #1e1e1e;
    padding: 2px 8px; border-radius: 3px;
  }
  .badge-new {
    position: absolute; top: 7px; left: 7px;
    background: var(--pink); color: #fff;
    font-family: 'Orbitron', monospace;
    font-size: 0.52rem; font-weight: 700; letter-spacing: 1px;
    padding: 3px 8px; border-radius: 3px; z-index: 3;
    box-shadow: 0 0 10px #FF2D8A99;
  }
  .badge-popular {
    position: absolute; top: 7px; left: 7px;
    background: #ff8c00; color: #fff;
    font-family: 'Orbitron', monospace;
    font-size: 0.52rem; font-weight: 700; letter-spacing: 1px;
    padding: 3px 8px; border-radius: 3px; z-index: 3;
    box-shadow: 0 0 10px #ff8c0099;
  }
  .badge-new + .badge-popular,
  .badge-popular.has-new {
    top: 30px;
  }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: #000000cc; z-index: 100;
    align-items: center; justify-content: center;
    backdrop-filter: blur(8px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    width: 95vw; max-width: 1100px; height: 90vh;
    background: #0e0e0e; border: 1px solid var(--pink);
    border-radius: 10px; overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: 0 0 60px #FF2D8A30;
    animation: popIn 0.22s ease;
  }
  @keyframes popIn {
    from { transform: scale(0.94) translateY(8px); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  .modal-header {
    display: flex; align-items: center;
    padding: 11px 18px; background: #090909;
    border-bottom: 1px solid #1a1a1a; gap: 12px;
  }
  .modal-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.78rem; font-weight: 700;
    letter-spacing: 2.5px; color: var(--pink);
    text-transform: uppercase; flex: 1;
  }
  .modal-close {
    background: #1a1a1a; border: 1px solid #252525;
    color: #666; width: 30px; height: 30px;
    border-radius: 4px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem; font-family: 'Rajdhani', sans-serif;
    font-weight: 700; transition: all 0.15s;
  }
  .modal-close:hover { border-color: var(--pink); color: var(--pink); }
  .modal iframe { flex: 1; width: 100%; border: none; background: #000; }

  /* FOOTER */
  footer {
    position: relative; z-index: 5;
    text-align: center; padding: 18px;
    border-top: 1px solid #111;
    color: #252525; font-size: 0.75rem;
    letter-spacing: 1.5px; font-weight: 600; text-transform: uppercase;
  }
  footer b { color: #FF2D8A66; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0a0a0a; }
  ::-webkit-scrollbar-thumb { background: #FF2D8A44; border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--pink); }

  @media (max-width: 680px) {
    header { padding: 0 16px; }
    .search-bar { width: 140px; }
    .hero, .cats-bar, .grid-section { padding-left: 16px; padding-right: 16px; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="#">PINKGAME</a>
  <div class="hdr-div"></div>
  <nav>
    <a href="#" class="active">Home</a>
    <a href="#">Popular</a>
    <a href="#">New</a>
  </nav>
  <div class="search-bar">
    <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" placeholder="Search..." id="searchInput" oninput="filterGames()"/>
  </div>
</header>

<div class="hero">
  <div class="hero-eyebrow">// Unblocked Games</div>
  <h1>Play Anything.<br><em>No Limits.</em></h1>
  <p>Free browser games — no downloads, no BS</p>
</div>

<div class="cats-bar">
  <button class="cat-btn active" onclick="setCategory(this,'all')">All</button>
  <button class="cat-btn" onclick="setCategory(this,'arcade')">Arcade</button>
  <button class="cat-btn" onclick="setCategory(this,'puzzle')">Puzzle</button>
  <button class="cat-btn" onclick="setCategory(this,'action')">Action</button>
  <button class="cat-btn" onclick="setCategory(this,'io')">IO Games</button>
  <button class="cat-btn" onclick="setCategory(this,'strategy')">Strategy</button>
</div>

<div class="grid-section">
  <div class="section-label"><b>//</b> <span id="sectionCount">20</span> Games</div>
  <div class="game-grid" id="gameGrid"></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Game</div>
      <button class="modal-close" onclick="closeGame()">✕</button>
    </div>
    <iframe id="gameFrame" src="" allowfullscreen></iframe>
  </div>
</div>

<footer><b>PINKGAME</b> &nbsp;—&nbsp; All games free to play</footer>

<script>
const games = [
  { id:1,  name:"2048",              emoji:"🔢", bg:"#130810", cat:"puzzle",   url:"https://gabrielecirulli.github.io/2048/",                isNew:false, isPop:true  },
  { id:2,  name:"Slope",             emoji:"🔴", bg:"#0f0812", cat:"action",   url:"https://slope-game.github.io/",                         isNew:false, isPop:true  },
  { id:3,  name:"Shell Shockers",    emoji:"🥚", bg:"#100c0a", cat:"action",   url:"https://shellshock.io",                                 isNew:false, isPop:false },
  { id:4,  name:"Krunker.io",        emoji:"🎯", bg:"#0a0a10", cat:"io",       url:"https://krunker.io",                                    isNew:false, isPop:true  },
  { id:5,  name:"Slither.io",        emoji:"🐍", bg:"#0a100a", cat:"io",       url:"https://slither.io",                                    isNew:false, isPop:true  },
  { id:6,  name:"Agar.io",           emoji:"🫧", bg:"#0a0e14", cat:"io",       url:"https://agar.io",                                       isNew:false, isPop:true  },
  { id:7,  name:"Paper.io 2",        emoji:"📄", bg:"#100a0a", cat:"io",       url:"https://paper-io.com",                                  isNew:false, isPop:false },
  { id:8,  name:"Minesweeper",       emoji:"💣", bg:"#0d0d0d", cat:"puzzle",   url:"https://minesweeperonline.com",                         isNew:false, isPop:false },
  { id:9,  name:"Cookie Clicker",    emoji:"🍪", bg:"#120e08", cat:"strategy", url:"https://orteil.dashnet.org/cookieclicker/",             isNew:true,  isPop:true  },
  { id:10, name:"Retro Bowl",        emoji:"🏈", bg:"#0e1008", cat:"arcade",   url:"https://retrobowl.me",                                  isNew:true,  isPop:false },
  { id:11, name:"Wordle",            emoji:"🟩", bg:"#0a0e0a", cat:"puzzle",   url:"https://www.nytimes.com/games/wordle/index.html",        isNew:false, isPop:true  },
  { id:12, name:"Drift Boss",        emoji:"🚗", bg:"#100a0e", cat:"action",   url:"https://driftboss.io",                                  isNew:false, isPop:false },
  { id:13, name:"Geometry Dash",     emoji:"🟥", bg:"#100808", cat:"arcade",   url:"https://geometrydashsubzero.com",                       isNew:false, isPop:true  },
  { id:14, name:"Tetris",            emoji:"🧱", bg:"#0a0a12", cat:"arcade",   url:"https://tetris.com/play-tetris",                        isNew:false, isPop:true  },
  { id:15, name:"Minecraft Classic", emoji:"⛏️", bg:"#0d0e08", cat:"action",   url:"https://classic.minecraft.net",                         isNew:false, isPop:true  },
  { id:16, name:"Chess",             emoji:"♟️", bg:"#0d0d0d", cat:"strategy", url:"https://lichess.org",                                   isNew:false, isPop:false },
  { id:17, name:"Cut the Rope",      emoji:"🪢", bg:"#0a100a", cat:"puzzle",   url:"https://www.cuttherope.net",                            isNew:false, isPop:false },
  { id:18, name:"Tanki Online",      emoji:"🛡️", bg:"#0e0c08", cat:"action",   url:"https://tankionline.com",                               isNew:true,  isPop:false },
  { id:19, name:"Uno Online",        emoji:"🃏", bg:"#100a0a", cat:"arcade",   url:"https://poki.com/en/g/uno-online",                      isNew:true,  isPop:false },
  { id:20, name:"Subway Surfers",    emoji:"🏃", bg:"#0a0e12", cat:"arcade",   url:"https://poki.com/en/g/subway-surfers",                  isNew:false, isPop:true  },
];

let currentCat = 'all', searchTerm = '';

function setCategory(btn, cat) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = cat;
  renderGrid();
}

function filterGames() {
  searchTerm = document.getElementById('searchInput').value.toLowerCase();
  renderGrid();
}

function renderGrid() {
  let filtered = games.filter(g =>
    (currentCat === 'all' || g.cat === currentCat) &&
    g.name.toLowerCase().includes(searchTerm)
  );
  // NEW games always float to top
  filtered.sort((a, b) => (b.isNew ? 1 : 0) - (a.isNew ? 1 : 0));
  document.getElementById('sectionCount').textContent = filtered.length;
  document.getElementById('gameGrid').innerHTML = filtered.map(g => {
    const newBadge  = g.isNew  ? '<div class="badge-new">NEW</div>'                                   : '';
    const popBadge  = g.isPop  ? `<div class="badge-popular${g.isNew ? ' has-new' : ''}">HOT</div>`  : '';
    return `
    <div class="game-card" onclick="openGame(${g.id})">
      ${newBadge}${popBadge}
      <div class="thumb" style="background: radial-gradient(circle at 35% 35%, ${g.bg}, #0a0a0a);">
        <span style="position:relative;z-index:1;">${g.emoji}</span>
        <div class="play-overlay"><div class="play-btn">▶</div></div>
      </div>
      <div class="info">
        <div class="name">${g.name}</div>
        <span class="tag">${g.cat}</span>
      </div>
    </div>`;
  }).join('');
}

function openGame(id) {
  const g = games.find(x => x.id === id);
  if (!g) return;
  document.getElementById('modalTitle').textContent = g.name;
  document.getElementById('gameFrame').src = g.url;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeGame() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('gameFrame').src = '';
  document.body.style.overflow = '';
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeGame();
}

renderGrid();
</script>
</body>
</html>
