<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TEST...</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    font-family: 'Rajdhani', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    color: #fff;
  }

  /* ── SCANLINES ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      #00000022 2px,
      #00000022 4px
    );
    pointer-events: none;
    z-index: 99;
    animation: scanMove 8s linear infinite;
  }
  @keyframes scanMove {
    from { background-position: 0 0; }
    to   { background-position: 0 100px; }
  }

  /* ── GRID BG ── */
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(#FF2D8A0b 1px, transparent 1px),
      linear-gradient(90deg, #FF2D8A0b 1px, transparent 1px);
    background-size: 44px 44px;
    animation: gridPulse 3s ease-in-out infinite alternate;
  }
  @keyframes gridPulse {
    from { opacity: 0.5; }
    to   { opacity: 1; }
  }

  /* ── VIGNETTE ── */
  .vignette {
    position: fixed; inset: 0; z-index: 1;
    background: radial-gradient(ellipse at center, transparent 30%, #000000cc 100%);
    pointer-events: none;
  }

  /* ── PARTICLES ── */
  .particles {
    position: fixed; inset: 0; z-index: 2; overflow: hidden; pointer-events: none;
  }
  .particle {
    position: absolute;
    width: 2px; height: 2px;
    background: #FF2D8A;
    border-radius: 50%;
    box-shadow: 0 0 6px #FF2D8A;
    animation: particleFly linear infinite;
    opacity: 0;
  }
  @keyframes particleFly {
    0%   { transform: translateY(100vh) translateX(0) scale(0); opacity: 0; }
    5%   { opacity: 1; }
    95%  { opacity: 0.6; }
    100% { transform: translateY(-10vh) translateX(var(--dx)) scale(1.5); opacity: 0; }
  }

  /* ── MAIN CONTAINER ── */
  .loader {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; gap: 0;
    animation: fadeInUp 0.6s ease both;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── LOGO ── */
  .logo-wrap {
    position: relative;
    margin-bottom: 48px;
  }
  .logo-glow-ring {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 260px; height: 260px;
    border-radius: 50%;
    border: 1px solid #FF2D8A22;
    animation: ringPulse 2s ease-in-out infinite;
  }
  .logo-glow-ring:nth-child(2) {
    width: 320px; height: 320px;
    animation-delay: 0.4s;
    border-color: #FF2D8A14;
  }
  .logo-glow-ring:nth-child(3) {
    width: 380px; height: 380px;
    animation-delay: 0.8s;
    border-color: #FF2D8A0a;
  }
  @keyframes ringPulse {
    0%   { transform: translate(-50%, -50%) scale(0.95); opacity: 0.4; }
    50%  { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.4; }
  }

  .logo-icon {
    position: relative; z-index: 2;
    width: 110px; height: 110px;
    background: #0d0d0d;
    border: 1.5px solid #FF2D8A55;
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    box-shadow:
      0 0 40px #FF2D8A44,
      0 0 80px #FF2D8A22,
      inset 0 0 30px #FF2D8A0a;
    animation: logoFloat 3s ease-in-out infinite;
  }
  @keyframes logoFloat {
    0%, 100% { transform: translateY(0); box-shadow: 0 0 40px #FF2D8A44, 0 0 80px #FF2D8A22, inset 0 0 30px #FF2D8A0a; }
    50%       { transform: translateY(-8px); box-shadow: 0 14px 60px #FF2D8A55, 0 0 100px #FF2D8A33, inset 0 0 40px #FF2D8A14; }
  }

  .logo-icon svg { width: 58px; height: 58px; }

  .logo-text {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 2.8rem;
    letter-spacing: 6px;
    color: #fff;
    text-shadow:
      0 0 20px #FF2D8Aaa,
      0 0 60px #FF2D8A55;
    margin-top: 28px;
    position: relative;
    animation: glitchText 6s infinite;
  }
  .logo-text::before,
  .logo-text::after {
    content: 'PINKGAME';
    position: absolute;
    top: 0; left: 0; right: 0;
    opacity: 0;
  }
  .logo-text::before {
    color: #00ffff;
    animation: glitchBefore 6s infinite;
    clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%);
  }
  .logo-text::after {
    color: #FF2D8A;
    animation: glitchAfter 6s infinite;
    clip-path: polygon(0 60%, 100% 60%, 100% 75%, 0 75%);
  }
  @keyframes glitchText {
    0%,89%,91%,94%,96%,100% { transform: translate(0); }
    90%  { transform: translate(-2px, 1px); }
    92%  { transform: translate(2px, -1px); }
    95%  { transform: translate(-1px, 2px); }
  }
  @keyframes glitchBefore {
    0%,89%,96%,100% { opacity: 0; transform: translate(0); }
    90%  { opacity: 0.8; transform: translate(-3px, 0); }
    92%  { opacity: 0; }
    93%  { opacity: 0.6; transform: translate(3px, 0); }
    95%  { opacity: 0; }
  }
  @keyframes glitchAfter {
    0%,88%,96%,100% { opacity: 0; transform: translate(0); }
    89%  { opacity: 0.7; transform: translate(3px, 0); }
    91%  { opacity: 0; }
    93%  { opacity: 0.5; transform: translate(-3px, 0); }
    95%  { opacity: 0; }
  }

  .logo-sub {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 5px;
    color: #FF2D8A88;
    text-transform: uppercase;
    margin-top: 6px;
    text-align: center;
  }

  /* ── PROGRESS ── */
  .progress-wrap {
    width: 320px;
    margin-top: 50px;
  }
  .progress-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .progress-label {
    font-family: 'Orbitron', monospace;
    font-size: 0.6rem;
    letter-spacing: 3px;
    color: #333;
    text-transform: uppercase;
  }
  .progress-pct {
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    letter-spacing: 1px;
    color: var(--pink, #FF2D8A);
    text-shadow: 0 0 10px #FF2D8A88;
    transition: none;
  }

  .progress-track {
    width: 100%;
    height: 3px;
    background: #151515;
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }
  .progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #c0005a, #FF2D8A, #ff85c4);
    border-radius: 2px;
    transition: width 0.08s linear;
    box-shadow: 0 0 10px #FF2D8Aaa, 0 0 20px #FF2D8A55;
    position: relative;
  }
  .progress-bar::after {
    content: '';
    position: absolute;
    right: 0; top: -3px;
    width: 4px; height: 9px;
    background: #fff;
    border-radius: 2px;
    box-shadow: 0 0 8px #FF2D8A, 0 0 16px #FF2D8A;
    filter: blur(0.5px);
  }

  .progress-track-dots {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    padding: 0 1px;
  }
  .dot {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: #1e1e1e;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .dot.lit {
    background: #FF2D8A;
    box-shadow: 0 0 6px #FF2D8A;
  }

  .status-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 2px;
    color: #2a2a2a;
    text-transform: uppercase;
    margin-top: 16px;
    text-align: center;
    min-height: 1.2em;
    transition: color 0.3s;
  }

  /* ── CORNER DECORATIONS ── */
  .corner {
    position: fixed;
    width: 40px; height: 40px;
    z-index: 10;
    opacity: 0.4;
  }
  .corner-tl { top: 20px; left: 20px; border-top: 1.5px solid #FF2D8A; border-left: 1.5px solid #FF2D8A; }
  .corner-tr { top: 20px; right: 20px; border-top: 1.5px solid #FF2D8A; border-right: 1.5px solid #FF2D8A; }
  .corner-bl { bottom: 20px; left: 20px; border-bottom: 1.5px solid #FF2D8A; border-left: 1.5px solid #FF2D8A; }
  .corner-br { bottom: 20px; right: 20px; border-bottom: 1.5px solid #FF2D8A; border-right: 1.5px solid #FF2D8A; }

  /* ── FLASH OUT ── */
  .flash-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: #FF2D8A;
    opacity: 0; pointer-events: none;
    transition: opacity 0.15s ease;
  }
  .flash-overlay.go { opacity: 1; }

  /* ── SIDE TEXT ── */
  .side-text {
    position: fixed;
    font-family: 'Orbitron', monospace;
    font-size: 0.55rem;
    letter-spacing: 3px;
    color: #FF2D8A22;
    text-transform: uppercase;
    z-index: 10;
  }
  .side-left  { left: 20px; top: 50%; transform: translateY(-50%) rotate(-90deg); transform-origin: center; }
  .side-right { right: 20px; top: 50%; transform: translateY(-50%) rotate(90deg); transform-origin: center; }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="vignette"></div>
<div class="particles" id="particles"></div>

<!-- Corners -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- Side text -->
<div class="side-text side-left">UNBLOCKED GAMES // FREE TO PLAY</div>
<div class="side-text side-right">NO LIMITS // NO DOWNLOADS</div>

<div class="loader">
  <div class="logo-wrap">
    <div class="logo-glow-ring"></div>
    <div class="logo-glow-ring"></div>
    <div class="logo-glow-ring"></div>

    <div class="logo-icon">
      <!-- controller icon -->
      <svg viewBox="0 0 58 58" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="6" y="18" width="46" height="24" rx="12" fill="#1a0010" stroke="#FF2D8A" stroke-width="1.5"/>
        <circle cx="38" cy="26" r="3" fill="#FF2D8A" opacity="0.9"/>
        <circle cx="44" cy="31" r="3" fill="#FF2D8A" opacity="0.6"/>
        <circle cx="32" cy="31" r="3" fill="#FF2D8A" opacity="0.6"/>
        <circle cx="38" cy="36" r="3" fill="#FF2D8A" opacity="0.4"/>
        <!-- dpad -->
        <rect x="13" y="28" width="10" height="3" rx="1.5" fill="#FF2D8A" opacity="0.7"/>
        <rect x="16.5" y="24.5" width="3" height="10" rx="1.5" fill="#FF2D8A" opacity="0.7"/>
        <!-- bumpers -->
        <rect x="13" y="14" width="10" height="5" rx="2.5" fill="#FF2D8A33" stroke="#FF2D8A44" stroke-width="1"/>
        <rect x="35" y="14" width="10" height="5" rx="2.5" fill="#FF2D8A33" stroke="#FF2D8A44" stroke-width="1"/>
      </svg>
    </div>
  </div>

  <div class="logo-text">PINKGAME TEST</div>
  <div class="logo-sub">// your not supposed to be here buddy //</div>

  <div class="progress-wrap">
    <div class="progress-top">
      <span class="progress-label">Loading</span>
      <span class="progress-pct" id="pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-bar" id="bar"></div>
    </div>
    <div class="progress-track-dots" id="dots"></div>
    <div class="status-text" id="status">Initializing...</div>
  </div>
</div>

<div class="flash-overlay" id="flash"></div>

<script>
// ── PARTICLES ──
const pEl = document.getElementById('particles');
for (let i = 0; i < 30; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.cssText = `
    left: ${Math.random() * 100}vw;
    --dx: ${(Math.random() - 0.5) * 120}px;
    animation-duration: ${6 + Math.random() * 10}s;
    animation-delay: ${-Math.random() * 14}s;
    width: ${1 + Math.random() * 2.5}px;
    height: ${1 + Math.random() * 2.5}px;
  `;
  pEl.appendChild(p);
}

// ── DOTS ──
const dotsEl = document.getElementById('dots');
const DOT_COUNT = 12;
for (let i = 0; i < DOT_COUNT; i++) {
  const d = document.createElement('div');
  d.className = 'dot';
  dotsEl.appendChild(d);
}
const dots = dotsEl.querySelectorAll('.dot');

// ── LOADING SEQUENCE ──
const steps = [
  { pct: 8,   label: 'Initializing...' },
  { pct: 22,  label: 'Loading assets...' },
  { pct: 38,  label: 'Fetching games...' },
  { pct: 55,  label: 'Building library...' },
  { pct: 71,  label: 'Applying theme...' },
  { pct: 85,  label: 'Almost there...' },
  { pct: 95,  label: 'Launching...' },
  { pct: 100, label: 'Ready.' },
];

const bar    = document.getElementById('bar');
const pct    = document.getElementById('pct');
const status = document.getElementById('status');
const flash  = document.getElementById('flash');

let current = 0;
let displayed = 0;

function updateDots(p) {
  const lit = Math.round((p / 100) * DOT_COUNT);
  dots.forEach((d, i) => d.classList.toggle('lit', i < lit));
}

function animateTo(target, label, duration, then) {
  const start = displayed;
  const startTime = performance.now();
  function tick(now) {
    const t = Math.min((now - startTime) / duration, 1);
    const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    displayed = Math.round(start + (target - start) * ease);
    bar.style.width = displayed + '%';
    pct.textContent  = displayed + '%';
    updateDots(displayed);
    if (t < 1) requestAnimationFrame(tick);
    else { displayed = target; then && then(); }
  }
  status.textContent = label;
  requestAnimationFrame(tick);
}

function runStep() {
  if (current >= steps.length) return;
  const s = steps[current++];
  const gap = s.pct - (current > 1 ? steps[current - 2].pct : 0);
  const dur = 300 + gap * 18 + Math.random() * 200;
  animateTo(s.pct, s.label, dur, () => {
    if (current < steps.length) {
      setTimeout(runStep, 120 + Math.random() * 250);
    } else {
      // done — flash and redirect
      setTimeout(() => {
        flash.classList.add('go');
        setTimeout(() => { window.location.href = 'games.html'; }, 200);
      }, 400);
    }
  });
}

setTimeout(runStep, 300);
</script>
</body>
</html>
